<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數讀無廣告，漲停馬上到：Ｄ</title>
    <style>
        :root {
            --primary: #3498db; --error: #e74c3c; --success: #27ae60;
            --cell-bg: #ffffff; --grid-border: #333; --highlight: #e3f2fd;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center;
            padding: 15px; min-height: 100vh;
        }
        
        .main-title { 
            font-size: 22px; font-weight: 900; color: #d35400; 
            margin-bottom: 15px; text-align: center; width: 100%;
        }

        .header { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #timer { font-size: 20px; font-weight: bold; color: var(--primary); font-family: monospace; }
        select { padding: 5px; border-radius: 5px; border: 1px solid #ccc; background: white; }

        /* 錯誤提示開關樣式 */
        .toggle-container {
            width: 100%; max-width: 450px; background: #fff; padding: 10px 15px;
            border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; color: #555;
        }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }

        .sudoku-wrapper { width: 100%; max-width: 450px; aspect-ratio: 1 / 1; background: var(--grid-border); border: 2px solid var(--grid-border); display: grid; grid-template-columns: repeat(9, 1fr); gap: 1px; }
        .cell { background: var(--cell-bg); display: flex; align-items: center; justify-content: center; font-size: 6vw; cursor: pointer; position: relative; }
        @media (min-width: 450px) { .cell { font-size: 26px; } }
        
        .cell:nth-child(3n) { border-right: 2px solid var(--grid-border); }
        .cell:nth-child(9n) { border-right: none; }
        .sudoku-wrapper > div:nth-child(n+19):nth-child(-n+27),
        .sudoku-wrapper > div:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--grid-border); }

        .cell.fixed { font-weight: 900; background: #f8f9fa; color: #2c3e50; }
        .cell.selected { background: var(--highlight) !important; box-shadow: inset 0 0 0 2px var(--primary); z-index: 1; }
        .cell.wrong-flash { background: #ffdada !important; color: var(--error); animation: shake 0.3s ease-in-out; }
        
        .notes-grid { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(3, 1fr); padding: 1px; pointer-events: none; }
        .note-num { font-size: 2.2vw; color: #95a5a6; display: flex; align-items: center; justify-content: center; }
        @media (min-width: 450px) { .note-num { font-size: 10px; } }

        .number-pad { width: 100%; max-width: 450px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .num-btn { background: white; border: none; border-radius: 12px; padding: 15px 0; font-size: 22px; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .num-btn:active { background: var(--primary); color: white; transform: scale(0.9); }
        .num-btn.tool { background: #e0e0e0; font-size: 16px; }

        .toolbar { margin-top:15px; display: flex; gap:12px; width:100%; max-width:450px; }
        .toolbar button { flex:1; padding:12px; border-radius:10px; border:none; color:white; font-weight:bold; font-size: 16px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }

        .records { width: 100%; max-width: 450px; background: rgba(255,255,255,0.7); margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 14px; display: flex; justify-content: space-around; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(5px); } 40%, 80% { transform: translateX(-5px); } }
    </style>
</head>
<body>

<div class="main-title">數讀無廣告，漲停馬上到：Ｄ</div>

<div class="toggle-container">
    <span>⚠️ 填錯時立即提示</span>
    <label class="switch">
        <input type="checkbox" id="errorToggle" checked>
        <span class="slider"></span>
    </label>
</div>

<div class="header">
    <div id="timer">00:00</div>
    <select id="diff" onchange="newGame()">
        <option value="35">難度：簡單</option>
        <option value="45">難度：普通</option>
        <option value="55">難度：困難</option>
    </select>
</div>

<div class="sudoku-wrapper" id="grid"></div>

<div class="number-pad">
    <div class="num-btn" onclick="inputNum(1)">1</div>
    <div class="num-btn" onclick="inputNum(2)">2</div>
    <div class="num-btn" onclick="inputNum(3)">3</div>
    <div class="num-btn" onclick="inputNum(4)">4</div>
    <div class="num-btn" onclick="inputNum(5)">5</div>
    <div class="num-btn" onclick="inputNum(6)">6</div>
    <div class="num-btn" onclick="inputNum(7)">7</div>
    <div class="num-btn" onclick="inputNum(8)">8</div>
    <div class="num-btn" onclick="inputNum(9)">9</div>
    <div class="num-btn tool" onclick="inputNum('delete')">刪除</div>
</div>

<div class="toolbar">
    <button id="noteBtn" onclick="toggleNote()" style="background:#95a5a6;">筆記：關</button>
    <button onclick="getHint()" style="background:#f39c12;">獲取提示</button>
</div>

<div class="records">
    <span>簡單: <b id="best-35">--</b></span>
    <span>普通: <b id="best-45">--</b></span>
    <span>困難: <b id="best-55">--</b></span>
</div>

<script>
    let board = [], solution = [], userNotes = Array.from({length: 81}, () => new Set()), 
        isNoteMode = false, selectedIdx = -1, seconds = 0, timerInterval;

    function formatTime(s) { return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); }

    function newGame() {
        clearInterval(timerInterval); seconds = 0; 
        document.getElementById('timer').innerText = "00:00";
        timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = formatTime(seconds); }, 1000);
        
        board = Array(81).fill(0); 
        (function solve(b) {
            for(let i=0; i<81; i++) {
                if(b[i] === 0) {
                    let nums = [1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
                    for(let n of nums) { if(isValid(b, i, n)) { b[i]=n; if(solve(b)) return true; b[i]=0; } }
                    return false;
                }
            } return true;
        })(board);
        solution = [...board];
        
        let diff = parseInt(document.getElementById('diff').value);
        let removed = 0; while(removed < diff) {
            let r = Math.floor(Math.random()*81);
            if(board[r] !== 0) { board[r] = 0; removed++; }
        }
        userNotes = Array.from({length: 81}, () => new Set());
        selectedIdx = -1; render(); loadRecords();
    }

    function isValid(b, idx, n) {
        let r = Math.floor(idx/9), c = idx%9;
        for(let i=0; i<9; i++) if(b[r*9+i]==n || b[i*9+c]==n) return false;
        let sr = Math.floor(r/3)*3, sc = Math.floor(c/3)*3;
        for(let i=0; i<3; i++) for(let j=0; j<3; j++) if(b[(sr+i)*9+(sc+j)]==n) return false;
        return true;
    }

    function render() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        board.forEach((val, i) => {
            const el = document.createElement('div');
            el.className = `cell ${val!==0 && solution[i]===val ? 'fixed' : ''}`;
            if(i === selectedIdx) el.classList.add('selected');
            if(val !== 0) el.innerText = val;
            else {
                const nGrid = document.createElement('div'); nGrid.className = 'notes-grid';
                for(let n=1; n<=9; n++) {
                    const s = document.createElement('div'); s.className = 'note-num';
                    if(userNotes[i].has(n)) s.innerText = n;
                    nGrid.appendChild(s);
                }
                el.appendChild(nGrid);
            }
            el.onclick = (e) => { e.stopPropagation(); selectedIdx = i; render(); };
            grid.appendChild(el);
        });
        checkWin();
    }

    function inputNum(n) {
        if(selectedIdx === -1 || solution[selectedIdx] === board[selectedIdx]) return;
